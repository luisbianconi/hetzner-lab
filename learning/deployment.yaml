apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: test
spec:
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
      - image: nginx:latest
        imagePullPolicy: Always
        name: nginx
        ports:
        - containerPort: 80
          protocol: TCP
      - image: busybox
        imagePullPolicy: Always
        name: busybox
        command: [ "sh", "-c", "sleep 3600" ]
      dnsPolicy: ClusterFirst
      restartPolicy: Always
