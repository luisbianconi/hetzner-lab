name: Full Cleanup of Infrastructure on Hetzner Cloud

on:
  workflow_dispatch:

concurrency:
  group: terraform-state
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  fullcleanup:
    runs-on: ubuntu-latest
    environment:
      name: lab
      
    steps:
      - uses: actions/checkout@v4

      - uses: hetznercloud/setup-hcloud@v2

      - name: Delete Hetzner lab resources
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          for id in $(hcloud server list --selector "lab=true" -o noheader -o columns=id); do
            hcloud server delete "$id"
          done

          sleep 60

          for id in $(hcloud firewall list --selector "lab=true" -o noheader -o columns=id); do
            hcloud firewall delete "$id"
          done

          for id in $(hcloud network list --selector "lab=true" -o noheader -o columns=id); do
            hcloud network delete "$id"
          done

          for id in $(hcloud ssh-key list --selector "lab=true" -o noheader -o columns=id); do
            hcloud ssh-key delete "$id"
          done

      - name: Cleanup Tailscale lab devices via OAuth
        env:
          TAILSCALE_TAILNET: ${{ secrets.TAILSCALE_TAILNET }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OPERATOR_OAUTH_CLIENT_ID }}
          TS_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OPERATOR_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          access_token=$(curl -sS -X POST "https://api.tailscale.com/api/v2/oauth/token" \
            -u "${TS_OAUTH_CLIENT_ID}:${TS_OAUTH_CLIENT_SECRET}" \
            -d "grant_type=client_credentials" |
            jq -r '.access_token')

          devices=$(curl -sS \
            -H "Authorization: Bearer ${access_token}" \
            "https://api.tailscale.com/api/v2/tailnet/${TAILSCALE_TAILNET}/devices")

          ids=$(echo "$devices" | jq -r '
            .devices[]
            | select(.tags[]? == "tag:lab-k8s-hetzner")
            | .id
          ')

          if [ -z "$ids" ]; then
            echo "No Tailscale devices found with tag:lab-k8s-hetzner"
            exit 0
          fi

          echo "$ids" | while read -r device_id; do
            echo "Deleting Tailscale device: $device_id"

            curl -sS -X DELETE \
              -H "Authorization: Bearer ${access_token}" \
              "https://api.tailscale.com/api/v2/device/${device_id}"
          done

      - name: Delete Terraform state artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          artifact_ids="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts?name=terraform-state&per_page=100" --jq '.artifacts[].id')"

          if [ -z "$artifact_ids" ]; then
            echo "No terraform-state artifacts found."
            exit 0
          fi

          for id in $artifact_ids; do
            gh api --method DELETE "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}"
          done

      - name: Set lab status inactive
        run: |
          bash .github/scripts/update-lab-status.sh inactive 0

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: set lab status inactive" || echo "No changes"
          git push
